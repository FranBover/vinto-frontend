# React (Vite) App - Azure DevOps Build Pipeline

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '22.x'
  displayName: 'Install Node.js'

- script: npm install
  displayName: 'Install dependencies'

- script: npm run build
  displayName: 'Build React app'

- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: '$(Build.SourcesDirectory)/dist'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/vinto-frontend.zip'
    replaceExistingArchive: true
  displayName: 'Archive build output'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'vinto-frontend-$(Build.SourceBranchName)-$(Build.BuildId)'
    publishLocation: 'Container'
  displayName: 'Publish artifacts'

- task: AzureWebApp@1
  displayName: 'Deploy to Azure Web App (Linux)'
  inputs:
    azureSubscription: 'Azure-Vinto'
    appType: 'webAppLinux'
    appName: 'Vinto-Frontend-dev'
    package: '$(Build.ArtifactStagingDirectory)/vinto-frontend.zip'
    startUpCommand: 'pm2 serve /home/site/wwwroot --no-daemon --spa'
